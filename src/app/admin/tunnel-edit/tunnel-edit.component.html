<app-editor [(ngModel)]="data" (ngModelChange)="basicForm.patchValue($event)" [submitting]="submitting" (submit)="submit()">

  <nz-collapse [formGroup]="basicForm" (change)="change()">
    <nz-collapse-panel nzHeader="基本信息" nzActive>
      <nz-form-item>
        <nz-form-label [nzSpan]="5">名称</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <input nz-input formControlName="name" required/>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">超时(s)</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <nz-input-number formControlName="timeout" [nzMin]="5" [nzMax]="600" [nzStep]="1"></nz-input-number>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">企业</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <app-choose-company formControlName="company_id" [showClear]="true"></app-choose-company>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">位置</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <app-input-gps formControlName="location"></app-input-gps>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">启用</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <nz-switch formControlName="enable"></nz-switch>
        </nz-form-control>
      </nz-form-item>

    </nz-collapse-panel>

    <nz-collapse-panel nzHeader="心跳包">
      <app-tunnel-edit-heartbeat formControlName="heartbeat"></app-tunnel-edit-heartbeat>
    </nz-collapse-panel>

    <nz-collapse-panel nzHeader="控制包">
      <app-tunnel-edit-control formControlName="control"></app-tunnel-edit-control>
    </nz-collapse-panel>

    <nz-collapse-panel nzHeader="协议适配">
      <app-tunnel-edit-protocol formControlName="protocol"></app-tunnel-edit-protocol>
    </nz-collapse-panel>

  </nz-collapse>


</app-editor>
