<nz-table
  #pluginTable
  nzSize="small"
  [nzData]="datum"
  [nzLoading]="loading"
>
  <thead>
  <tr>
    <th nzColumnKey="name">名称</th>
    <th nzColumnKey="version">版本</th>
    <th nzWidth="100">操作</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let data of pluginTable.data; let i=index">
    <td>{{ data.name }}</td>
    <td>{{ data.version }}</td>
    <td></td>
  </tr>
  </tbody>
</nz-table>
