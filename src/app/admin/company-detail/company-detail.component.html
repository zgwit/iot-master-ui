

<nz-tabset [nzTabBarExtraContent]="extraTemplate">
  <nz-tab nzTitle="公司详情">
    <p>
      名称：{{data.name}}
      {{data.enable ? '启用' : '禁用'}}
      <nz-switch [ngModel]="data.enable" (ngModelChange)="enable($event)"></nz-switch>
    </p>
    <p *ngIf="data.user">
      用户：<a [routerLink]="'/admin/user/detail/'+data.user._id">{{data.user.name}}</a>
    </p>

  </nz-tab>
  <nz-tab nzTitle="成员">
    <ng-template nz-tab>
      <app-company-user [_id]="id"></app-company-user>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="项目">
    <ng-template nz-tab>
      <app-company-project [_id]="id"></app-company-project>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="设备">
    <ng-template nz-tab>
      <app-company-device [_id]="id"></app-company-device>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="通道">
    <ng-template nz-tab>
      <app-company-tunnel [_id]="id"></app-company-tunnel>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="项目分组">
    <ng-template nz-tab>
      <app-company-group [_id]="id"></app-company-group>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="告警记录">
    <ng-template nz-tab>
      <app-alarm type="company" [_id]="id"></app-alarm>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="告警订阅">
    <ng-template nz-tab>
      <app-subscribe type="company" [_id]="id"></app-subscribe>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="语音记录">
    <ng-template nz-tab>
      <app-voice [company_id]="id"></app-voice>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="日志">
    <ng-template nz-tab>
      <app-event type="company" [_id]="id"></app-event>
    </ng-template>
  </nz-tab>

</nz-tabset>

<ng-template #extraTemplate>
  <a (click)="load()" title="刷新">
    <i nz-icon nzType="reload" [nzSpin]="loading"></i>
  </a>
  <nz-divider nzType="vertical"></nz-divider>
  <a title="原始数据" appViewConfig [config]="data">
    <i nz-icon nzType="profile"></i>
  </a>
  <nz-divider nzType="vertical"></nz-divider>
  <a title="编辑" [routerLink]="'/admin/company/edit/'+id">
    <i nz-icon nzType="form"></i>
  </a>
</ng-template>
