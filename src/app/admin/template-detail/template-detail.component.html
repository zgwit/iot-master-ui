

<nz-tabset>
  <nz-tab nzTitle="基本信息">
    <p>{{data|json}}</p>
  </nz-tab>
  <nz-tab nzTitle="项目实例">
    <ng-template nz-tab>
      <app-template-project [_id]="id"></app-template-project>

  </nz-tab>
  <nz-tab nzTitle="日志">
    <ng-template nz-tab>
      <app-event type="template" [_id]="id"></app-event>
    </ng-template>
  </nz-tab>

</nz-tabset>
