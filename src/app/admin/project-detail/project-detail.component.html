

<nz-tabset>
  <nz-tab nzTitle="基本信息">
    <p>{{data|json}}</p>
  </nz-tab>
  <nz-tab nzTitle="可视化" nzDisabled>
    <ng-template nz-tab>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="定时任务">
    <ng-template nz-tab>
      <app-job type="project" [_id]="id"></app-job>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="告警">
    <ng-template nz-tab>
      <app-alarm type="project" [_id]="id"></app-alarm>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="订阅">
    <ng-template nz-tab>
      <app-subscribe type="project" [_id]="id"></app-subscribe>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="日志">
    <ng-template nz-tab>
      <app-event type="project" [_id]="id"></app-event>
    </ng-template>
  </nz-tab>

</nz-tabset>

<ng-template #extraTemplate>
  <a [routerLink]="'/admin/project/edit/'+id">
    <i nz-icon nzType="form"></i>
  </a>
</ng-template>
