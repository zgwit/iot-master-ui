<div nz-form [formGroup]="validateForm" (ngSubmit)="submitForm(validateForm.value)">
  <nz-form-item>
    <nz-form-label [nzSpan]="5">名称</nz-form-label>
    <nz-form-control [nzSpan]="12" nzErrorTip="">
      <input nz-input formControlName="name" required/>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label [nzSpan]="5">类型</nz-form-label>
    <nz-form-control [nzSpan]="12" nzErrorTip="">
      <nz-select formControlName="type">
        <nz-option nzValue="tcp-server" nzLabel="TCP服务器"></nz-option>
        <nz-option nzValue="tcp-client" nzLabel="TCP客户端"></nz-option>
        <nz-option nzValue="udp-server" nzLabel="UDP服务器" nzDisabled></nz-option>
        <nz-option nzValue="udp-client" nzLabel="UDP客户端" nzDisabled></nz-option>
      </nz-select>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label [nzSpan]="5">端口</nz-form-label>
    <nz-form-control [nzSpan]="12" nzErrorTip="">
      <!--      <input nz-input formControlName="port" type="number" min="1" max="65535"/>-->
      <nz-input-number formControlName="port" [nzMin]="1" [nzMax]="65535" [nzStep]="1"></nz-input-number>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label [nzSpan]="5">超时(s)</nz-form-label>
    <nz-form-control [nzSpan]="12" nzErrorTip="">
      <nz-input-number formControlName="timeout" [nzMin]="5" [nzMax]="600" [nzStep]="1"></nz-input-number>
    </nz-form-control>
  </nz-form-item>


  <nz-form-item>
    <nz-form-label [nzSpan]="5">注册包</nz-form-label>
    <nz-form-control formGroupName="register">

      <nz-form-item>
        <nz-form-label [nzSpan]="5">启用</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <!--          <input nz-input formControlName="enable" required/>-->
          <nz-switch formControlName="enable"></nz-switch>
        </nz-form-control>
      </nz-form-item>

      <div *ngIf="validateForm.value.register.enable">
        <nz-form-item>
          <nz-form-label [nzSpan]="5">正则表达式</nz-form-label>
          <nz-form-control [nzSpan]="12" nzErrorTip="">
            <input nz-input formControlName="regex" required/>
          </nz-form-control>
        </nz-form-item>
      </div>

    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label [nzSpan]="5">心跳包</nz-form-label>
    <nz-form-control formGroupName="register">

      <nz-form-item>
        <nz-form-label [nzSpan]="5">启用</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <!--          <input nz-input formControlName="enable" required/>-->
          <nz-switch formControlName="enable"></nz-switch>
        </nz-form-control>
      </nz-form-item>

      <div *ngIf="validateForm.value.register.enable">

        <nz-form-item>
          <nz-form-label [nzSpan]="5">间隔</nz-form-label>
          <nz-form-control [nzSpan]="12" nzErrorTip="">
            <nz-input-number formControlName="interval" [nzMin]="5" [nzMax]="600" [nzStep]="1"></nz-input-number>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzSpan]="5">正则表达式</nz-form-label>
          <nz-form-control [nzSpan]="12" nzErrorTip="">
            <input nz-input formControlName="regex" required/>
          </nz-form-control>
        </nz-form-item>
      </div>

    </nz-form-control>
  </nz-form-item>


</div>
