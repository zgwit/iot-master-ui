<app-editor [(ngModel)]="data" [submitting]="submitting" (submit)="submit()">

  <nz-tabset nzType="card" nzSize="small" [formGroup]="basicForm" (change)="change()">
    <nz-tab nzTitle="基本信息">
      <nz-form-item>
        <nz-form-label [nzSpan]="5">名称</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <input nz-input formControlName="name" required/>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">类型</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <input nz-input formControlName="type" required/>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">协议</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <nz-select formControlName="protocol" (ngModelChange)="onProtocolChange($event)">
            <nz-option *ngFor="let p of protocols"
              [nzValue]="p.name" [nzLabel]="p.label || p.name"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">生产厂家</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <input nz-input formControlName="manufacturer"/>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">型号</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <input nz-input formControlName="version"/>
        </nz-form-control>
      </nz-form-item>

    </nz-tab>

    <nz-tab nzTitle="变量映射">
      <app-element-edit-variables formControlName="variables" [codes]="codes"></app-element-edit-variables>
    </nz-tab>

    <nz-tab nzTitle="控制命令">
      <app-element-edit-commands formControlName="commands"></app-element-edit-commands>
    </nz-tab>

    <nz-tab nzTitle="采集器">
      <app-element-edit-collectors formControlName="collectors" [codes]="codes"></app-element-edit-collectors>
    </nz-tab>

  </nz-tabset>


</app-editor>
