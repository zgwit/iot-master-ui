

<nz-tabset>
  <nz-tab nzTitle="基本信息">
    <p>{{data|json}}</p>
  </nz-tab>
  <nz-tab nzTitle="可视化" nzDisabled>
    <ng-template nz-tab>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="告警">
    <ng-template nz-tab>
      记录
      与 告警订阅  table，人，内容，生效时间

  </nz-tab>
  <nz-tab nzTitle="日志">

      <app-event type="project" [_id]="id"></app-event>
    </ng-template>
  </nz-tab>

</nz-tabset>
