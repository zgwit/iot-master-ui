

<nz-tabset>
  <nz-tab nzTitle="基本信息">
    <p>{{data|json}}</p>
  </nz-tab>
  <nz-tab nzTitle="数据通道">
    <ng-template nz-tab>
      <app-acceptor-tunnel [_id]="id"></app-acceptor-tunnel>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="日志">
    <ng-template nz-tab>
      <app-event type="acceptor" [_id]="id"></app-event>
    </ng-template>
  </nz-tab>

</nz-tabset>
