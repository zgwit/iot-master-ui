

<nz-tabset [nzTabBarExtraContent]="extraTemplate">
  <nz-tab nzTitle="基本信息">
    <p>{{data|json}}</p>
  </nz-tab>
  <nz-tab nzTitle="成员">
    <ng-template nz-tab>
      <app-company-user [_id]="id"></app-company-user>
    </ng-template>
  </nz-tab>
  <nz-tab nzTitle="日志">
    <ng-template nz-tab>
      <app-event type="company" [_id]="id"></app-event>
    </ng-template>
  </nz-tab>

</nz-tabset>

<ng-template #extraTemplate>
  <a [routerLink]="'/admin/company/edit/'+id">
    <i nz-icon nzType="form"></i>
  </a>
</ng-template>
