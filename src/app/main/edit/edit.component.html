<nz-tabset [nzTabBarExtraContent]="extraTemplate">
  <nz-tab nzTitle="可视化">
    <ng-content></ng-content>
  </nz-tab>
  <nz-tab nzTitle="YAML">

  </nz-tab>

  <button nz-button nzType="primary" (click)="submit.emit($event)">提交</button>
</ng-template>
