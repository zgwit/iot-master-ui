<app-editor [(ngModel)]="data" [submitting]="submitting" (submit)="submit()">

  <nz-tabset nzType="card" nzSize="small" [formGroup]="basicForm" (change)="change()">
    <nz-tab nzTitle="基本信息">
      <nz-form-item>
        <nz-form-label [nzSpan]="5">名称</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <input nz-input formControlName="name" required/>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">模板</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
<!--          <input nz-input formControlName="template_id" required/>-->
          <app-choose-template formControlName="template_id"></app-choose-template>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSpan]="5">启用</nz-form-label>
        <nz-form-control [nzSpan]="12" nzErrorTip="">
          <nz-switch formControlName="enable"></nz-switch>
        </nz-form-control>
      </nz-form-item>
    </nz-tab>

    <nz-tab nzTitle="参数变量">
      <app-project-edit-variables formControlName="variables"></app-project-edit-variables>
    </nz-tab>

    <nz-tab nzTitle="绑定设备">
      <app-project-edit-devices formControlName="devices"></app-project-edit-devices>
    </nz-tab>

    <nz-tab nzTitle="控制命令">
      <app-project-edit-commands formControlName="commands"></app-project-edit-commands>
    </nz-tab>

    <nz-tab nzTitle="定时任务">
      <app-project-edit-jobs formControlName="jobs"></app-project-edit-jobs>
    </nz-tab>

    <nz-tab nzTitle="控制策略">
      <app-project-edit-strategies formControlName="strategies"></app-project-edit-strategies>
    </nz-tab>

    <nz-tab nzTitle="合法检查">
      <app-project-edit-validators formControlName="validators"></app-project-edit-validators>
    </nz-tab>

    <nz-tab nzTitle="自动脚本">
      <app-project-edit-scripts formControlName="scripts"></app-project-edit-scripts>
    </nz-tab>

  </nz-tabset>


</app-editor>
