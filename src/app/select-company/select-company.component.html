<div class="companies">
  <nz-row nzJustify="center">
    <nz-col [nzSpan]="18">
      <nz-list nzBordered>
        <nz-list-header>我的公司</nz-list-header>
        <nz-list-item *ngFor="let item of companies" (click)="open(item)">{{
          item.name
        }}</nz-list-item>
        <nz-list-item *ngIf="companies.length===0">加载中……</nz-list-item>
      </nz-list>
    </nz-col>
  </nz-row>
</div>
